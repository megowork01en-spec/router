name: Perpetual Dual
on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Install Dependencies & Run Script
        run: |
          # 1. تثبيت متصفح Google Chrome لبيئة الأوبونتو
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable -qq
          
          # 2. تثبيت مكتبات بايثون المطلوبة
          pip install selenium webdriver-manager requests -q

          # 3. إنشاء وتشغيل سكريبت الراوتر
          cat << 'EOF' > script.py
          import time
          import random
          import os
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait, Select
          from selenium.webdriver.support import expected_conditions as EC
          from webdriver_manager.chrome import ChromeDriverManager
          from webdriver_manager.core.os_manager import ChromeType

          # --- إعدادات الدخول ---
          URL = "https://mego.ddns.net/"
          USER = "admin"
          PASS = "Aa@198971"
          HISTORY_FILE = "last_priority.txt"

          def get_last_priority():
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r") as f:
                      try:
                          return int(f.read().strip())
                      except:
                          return -1
              return -1

          def save_last_priority(val):
              with open(HISTORY_FILE, "w") as f:
                  f.write(str(val))

          def advanced_wan_update(target_priority):
              chrome_options = Options()
              chrome_options.add_argument('--headless')
              chrome_options.add_argument('--no-sandbox')
              chrome_options.add_argument('--disable-dev-shm-usage')
              chrome_options.add_argument('--ignore-certificate-errors')
              
              try:
                  print("🚀 بدء الاتصال بالراوتر...")
                  service = Service(ChromeDriverManager(chrome_type=ChromeType.GOOGLE).install())
                  driver = webdriver.Chrome(service=service, options=chrome_options)
                  wait = WebDriverWait(driver, 30)

                  # 1. تسجيل الدخول
                  driver.get(URL)
                  print("🔑 تسجيل الدخول...")
                  wait.until(EC.presence_of_element_located((By.ID, "txt_Username"))).send_keys(USER)
                  driver.find_element(By.ID, "txt_Password").send_keys(PASS)
                  driver.find_element(By.ID, "loginbutton").click()
                  
                  time.sleep(8)
                  print("✅ تم الدخول بنجاح.")

                  # 2. الدخول على Advanced ثم WAN
                  print("⚙️ التنقل إلى Advanced -> WAN...")
                  try:
                      advanced_menu = wait.until(EC.element_to_be_clickable((By.ID, "name_addconfig")))
                      advanced_menu.click()
                      time.sleep(2)
                      
                      wan_menu = wait.until(EC.element_to_be_clickable((By.ID, "name_wanconfig")))
                      wan_menu.click()
                  except:
                      print("📦 البحث داخل الإطارات للقوائم...")
                      driver.switch_to.frame("mainFrame") 
                      wait.until(EC.element_to_be_clickable((By.ID, "name_addconfig"))).click()
                      wait.until(EC.element_to_be_clickable((By.ID, "name_wanconfig"))).click()

                  time.sleep(3)

                  # 3. اختيار اتصال WAN المحدد
                  print("📡 اختيار اتصال الـ WAN...")
                  driver.switch_to.default_content()
                  frames = driver.find_elements(By.TAG_NAME, "iframe")
                  for i in range(len(frames)):
                      driver.switch_to.default_content()
                      driver.switch_to.frame(i)
                      try:
                          wan_row = driver.find_element(By.ID, "wanInstTable_0_1")
                          wan_row.click()
                          print(f"✅ تم العثور على جدول WAN في Frame {i}")
                          break
                      except:
                          continue

                  # 4. تغيير VlanPriority بالقيمة المحددة
                  print(f"🔢 تغيير قيمة VlanPriority إلى {target_priority}...")
                  vlan_select_element = wait.until(EC.presence_of_element_located((By.ID, "VlanPriority")))
                  vlan_dropdown = Select(vlan_select_element)
                  
                  vlan_dropdown.select_by_value(str(target_priority))
                  print(f"🎯 تم إرسال القيمة الجديدة: {target_priority}")

                  # 5. الضغط على Apply
                  print("💾 حفظ الإعدادات (Apply)...")
                  driver.find_element(By.ID, "ButtonApply").click()
                  
                  try:
                      wait.until(EC.alert_is_present())
                      alert = driver.switch_to.alert
                      print(f"⚠️ رسالة الراوتر: {alert.text}")
                      alert.accept()
                  except:
                      pass

                  time.sleep(5)

                  # 6. تسجيل الخروج
                  print("🚪 تسجيل الخروج...")
                  driver.switch_to.default_content() 
                  
                  logged_out = False
                  try:
                      logout_btn = wait.until(EC.element_to_be_clickable((By.ID, "headerLogoutText")))
                      logout_btn.click()
                      print("👋 تم تسجيل الخروج بنجاح (الطريقة العادية).")
                      logged_out = True
                  except:
                      pass

                  if not logged_out:
                      frames = driver.find_elements(By.TAG_NAME, "iframe")
                      for i in range(len(frames)):
                          driver.switch_to.default_content()
                          driver.switch_to.frame(i)
                          try:
                              driver.find_element(By.ID, "headerLogoutText").click()
                              print(f"👋 تم تسجيل الخروج بنجاح (من داخل إطار {i}).")
                              logged_out = True
                              break
                          except:
                              continue

                  if not logged_out:
                      print("⚡ محاولة تسجيل الخروج باستخدام JavaScript مباشرة...")
                      driver.switch_to.default_content()
                      try:
                          driver.execute_script("logoutfunc();") 
                          print("👋 تم تسجيل الخروج بنجاح (عبر JavaScript).")
                      except Exception as e:
                          print("⚠️ تعذر تسجيل الخروج بالطرق المتاحة.")

                  print("✨ تم اكتمال تحديث الراوتر بنجاح لهذه الدورة!")

              except Exception as e:
                  print(f"❌ خطأ أثناء التنفيذ: {str(e)}")
              finally:
                  if 'driver' in locals():
                      driver.quit()

          # ==========================================
          # حلقة التكرار اللانهائية لتحديث الراوتر (جلسة 4 ساعات)
          # ==========================================
          SCRIPT_START_TIME = time.time()
          MAX_RUNTIME_SECONDS = 3.8 * 60 * 60  # حوالي 3 ساعات و 45 دقيقة لضمان إعادة التشغيل بأمان

          while True:
              # التحقق من انتهاء وقت الجلسة
              if time.time() - SCRIPT_START_TIME > MAX_RUNTIME_SECONDS:
                  print("\n" + "="*60)
                  print("⏳ اكتملت الجلسة الحالية. سيتم الخروج لإعادة تشغيل الأكشن من جديد...")
                  print("="*60)
                  break

              print("\n" + "="*60)
              
              # جلب آخر قيمة تم استخدامها
              last_val = get_last_priority()
              
              # اختيار قيمة عشوائية لا تساوي القيمة السابقة
              available_priorities = [p for p in range(8) if p != last_val]
              new_priority = random.choice(available_priorities)
              
              print(f"🔄 القيمة السابقة كانت: {last_val}")
              print(f"🎯 القيمة الجديدة التي تم اختيارها: {new_priority}")
              print("="*60)

              # تنفيذ الدالة
              advanced_wan_update(new_priority)
              
              # حفظ القيمة الجديدة في الملف
              save_last_priority(new_priority)

              # الانتظار لمدة 5 دقائق (300 ثانية)
              print("\n⏳ جاري الانتظار 5 دقائق (300 ثانية) قبل التحديث التالي...")
              time.sleep(300)

          EOF
          python script.py

      - name: 💾 Commit History to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_priority.txt || true
          git commit -m "📝 Update router VlanPriority history" || true
          git push || true

      - name: ⏳ Workflow Persistence (Auto-restart)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "جاري إعادة تشغيل الأكشن لضمان العمل المستمر (Perpetual Dual)..."
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
